<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Affiliate Platform</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header class="header">
        <nav class="nav">
            <a href="/" class="logo">👑 Admin Panel</a>
            <div class="nav-links">
                <a href="/admin-dashboard.html">Dashboard</a>
                <a href="/products.html">Produtos</a>
                <a href="/reports.html">Relatórios</a>
                <a href="#" onclick="logout()">Sair</a>
            </div>
        </nav>
    </header>
    
    <div class="container">
        <h1 style="color: white; margin-bottom: 30px;">📊 Dashboard Admin</h1>
        
        <div class="dashboard-stats" id="stats"></div>
        
        <div class="card">
            <h2>➕ Cadastrar Novo Curso</h2>
            <form id="productForm">
                <div class="form-group">
                    <label>Nome do Curso</label>
                    <input type="text" id="productName" required>
                </div>
                <div class="form-group">
                    <label>Descrição</label>
                    <textarea id="productDescription" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>Preço (R$)</label>
                    <input type="number" id="productPrice" step="0.01" required>
                </div>
                <div class="form-group">
                    <label>Categoria</label>
                    <select id="productCategory">
                        <option value="tecnologia">💻 Tecnologia</option>
                        <option value="marketing">📈 Marketing Digital</option>
                        <option value="culinaria">🍳 Culinária</option>
                        <option value="desenvolvimento">🌟 Desenvolvimento Pessoal</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>URL da Imagem</label>
                    <input type="url" id="productImage" placeholder="https://exemplo.com/imagem.jpg">
                </div>
                <button type="submit" class="btn">Cadastrar Curso</button>
            </form>
        </div>
        
        <div class="card">
            <h2>👥 Usuários da Plataforma</h2>
            <div class="table-container">
                <table class="table">
                    <thead>
                        <tr><th>Nome</th><th>Email</th><th>Tipo</th><th>Vendas (R$)</th><th>Ações</th></tr>
                    </thead>
                    <tbody id="usersList"></tbody>
                </table>
            </div>
        </div>
    </div>
    
    <script src="/script.js"></script>
    <script>
        async function loadAdminData() {
            try {
                const user = getUser();
                if (!user || user.role !== 'admin') {
                    window.location.href = '/login.html';
                    return;
                }
                
                // Load stats
                const stats = await apiCall('/data/admin/stats');
                document.getElementById('stats').innerHTML = `
                    <div class="stat-card">
                        <h3>👥 Total Usuários</h3>
                        <div class="stat-value">${stats.totalUsers}</div>
                    </div>
                    <div class="stat-card">
                        <h3>📚 Total Produtos</h3>
                        <div class="stat-value">${stats.totalProducts}</div>
                    </div>
                    <div class="stat-card">
                        <h3>💰 Total Vendas</h3>
                        <div class="stat-value">R$ ${stats.totalRevenue.toFixed(2)}</div>
                    </div>
                    <div class="stat-card">
                        <h3>💵 Comissões Pagas</h3>
                        <div class="stat-value">R$ ${stats.totalCommissions.toFixed(2)}</div>
                    </div>
                `;
                
                // Load users
                const users = await apiCall('/data/admin/users');
                document.getElementById('usersList').innerHTML = users.map(user => `
                    <tr>
                        <td>${user.name}</td>
                        <td>${user.email}</td>
                        <td><span class="badge">${user.role === 'admin' ? '👑 Admin' : user.role === 'affiliate' ? '🤝 Afiliado' : '💼 Vendedor'}</span></td>
                        <td>R$ ${user.totalSales?.toFixed(2) || '0.00'}</td>
                        <td>
                            <button onclick="changeUserRole('${user.id}', 'affiliate')" class="btn btn-sm">Virar Afiliado</button>
                            <button onclick="banUser('${user.id}')" class="btn btn-sm btn-danger">Banir</button>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('Error:', error);
            }
        }
        
        async function changeUserRole(userId, role) {
            try {
                await apiCall(`/data/admin/users/${userId}`, {
                    method: 'PUT',
                    body: JSON.stringify({ role })
                });
                alert('✅ Função alterada com sucesso!');
                loadAdminData();
            } catch (error) {
                alert('❌ Erro ao alterar função: ' + error.message);
            }
        }
        
        async function banUser(userId) {
            if (!confirm('Tem certeza que deseja banir este usuário?')) return;
            try {
                await apiCall(`/data/admin/users/${userId}`, {
                    method: 'PUT',
                    body: JSON.stringify({ isActive: false })
                });
                alert('✅ Usuário banido com sucesso!');
                loadAdminData();
            } catch (error) {
                alert('❌ Erro ao banir usuário: ' + error.message);
            }
        }
        
        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            try {
                await apiCall('/data/products', {
                    method: 'POST',
                    body: JSON.stringify({
                        name: document.getElementById('productName').value,
                        description: document.getElementById('productDescription').value,
                        price: parseFloat(document.getElementById('productPrice').value),
                        category: document.getElementById('productCategory').value,
                        imageUrl: document.getElementById('productImage').value
                    })
                });
                
                alert('✅ Produto cadastrado com sucesso!');
                document.getElementById('productForm').reset();
                loadAdminData();
            } catch (error) {
                alert('❌ Erro ao cadastrar produto: ' + error.message);
            }
        });
        
        window.changeUserRole = changeUserRole;
        window.banUser = banUser;
        loadAdminData();
    </script>
</body>
</html>
